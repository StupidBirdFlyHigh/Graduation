<div class="modal fade" id="myModal_add" tabindex="-1" role="dialog" aria-hidden="true">

        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">课程 添加</h4>
            </div>
            <div class="modal-body">
                <div class="col-sm-12 col-xs-12">
                    <div>

                        <div class="form-group">
                            <label>名称</label>
                            <input autocomplete="off" type="text" class="form-control" name="name">


                            <div class="form-group">
                                <label>授课老师</label>
                                <select class="form-control" id="lid1" name="lid"></select>
                            </div>

                            <div class="form-group">
                                <label>上课时间</label>
                                <input autocomplete="off" type="text" class="form-control" name="shijian">
                            </div>

                            <div class="form-group">
                                <label>上课教室</label>
                                <input autocomplete="off" type="text" class="form-control" name="jiaoshi">
                            </div>

                            <div class="form-group">
                                <label>lat <a href="https://lbs.qq.com/getPoint/" target="_blank">获取坐标</a></label>

</div>


<div class="modal fade" id="myModal_bianji" tabindex="-1" role="dialog" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h4 class="modal-title">课程 编辑</h4>
            </div>
            <div class="modal-body">
                <div class="col-sm-12 col-xs-12">
                    <div>

                        <div class="form-group">
                            <label>名称</label>
                            <input autocomplete="off" type="text" class="form-control" name="name">
                        </div>

                        <div class="form-group">
                            <label>授课老师</label>
                            <select class="form-control" id="lid2" name="lid"></select>
                        </div>

                        <div class="form-group">
                            <label>上课时间</label>
                            <input autocomplete="off" type="text" class="form-control" name="shijian">
                        </div>

                        <div class="form-group">
                            <label>上课教室</label>
                            <input autocomplete="off" type="text" class="form-control" name="jiaoshi">
                        </div>

                        <div class="form-group">
                            <label>lat <a href="https://lbs.qq.com/getPoint/" target="_blank">获取坐标</a></label>
                            <input autocomplete="off" type="text" class="form-control" name="lat">
                        </div>

                        <div class="form-group">
                            <label>lng</label>
                            <input autocomplete="off" type="text" class="form-control" name="lng">
                        </div>


                        <div style="text-align: center;margin-top: 30px">
                            <button type="button" class="btn btn-success mr-2" onclick="_xiugai()">修改</button>
                            <button type="button" class="btn btn-dark" onclick="_chongzhi('bianji')">重置</button>
                        </div>

                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger" data-dismiss="modal">Close</button>
            </div>
        </div>
    </div>

    <input onchange="uptu.tupian(this)" id="tu" accept="image/*" name="img" type="file" multiple>

<script>
    var uptu = new UpTu();

    _Setmenu('kecheng');

    var json = {};
    var nowid = 0;
    var biao = "kecheng";

    const _Getlaoshi = function () {
        return new Promise((succ, err) => {
            s.sb("laoshi");
            s.g("c/common_list_status", {
                s: (d) => {
                    if (d.code == 200) {
                        let html = d.data.map((o) => {
                            return `<option value="${o.id}">${o.name}</option>`;
                        })
                        document.getElementById('lid1').innerHTML = html.join("");
                        document.getElementById('lid2').innerHTML = html.join("");
                        succ();
                    }
                }
            })
        })
    }

    const _Getshuju = function () {
        return new Promise(function (succ, err) {
            s.sb(biao);
            s.g(`p/getkechengadminlist`, {
                s: function (data) {
                    if (data.code == 200) {
                        let info = data.data, html = [];
                        json = {};
                        html = info.map(function (obj) {
                            json[obj.id] = obj;
                            return `
                           <tr>
                             <td>${obj.lsname}</td>
                             <td>${obj.name}</td>
                             <td>${obj.shijian}</td>
                             <td>${obj.jiaoshi}</td>
                             <td>经度：${obj.lng}<br>纬度：${obj.lat}</td>
                             <td>${obj.addtime}</td>
                             <td><a href="javascript:_bianji('${obj.id}')">修改</a> | <a href="javascript:_shanchu('${obj.id}')">删除</a></td>
                           </tr>
                           `
                        });
                        document.getElementById('table').innerHTML = html.join('');
                        succ();
                    }
                },
                e: function (e) {

                }
            })
        })
    };

    _Getlaoshi().then(() => {
        return _Getshuju();
    })

    const _tijiao = function () {
        let input = ipt.getshuru('myModal_add', 'all');
        console.log('a')

        if (ipt.checkinput(input)) {
            console.log('a')

            let nr = ZY.MaptoJson(ipt.gettext(input));
            console.log('a')
            s.sj(nr);
            s.sb(biao);
            s.g('c/info_charu', {
                s: function (data) {
                    if (data.code == 200) {
                        toastr.success('新增成功');
                        _chongzhi('add');
                        _Getshuju();
                        ipt.clearinput(input);
                        $("#myModal_add").modal('hide');
                    } else {
                        toastr.error('新增失败');
                    }
                },
                e: function (e) {
                    toastr.error('网络错误');
                }
            })
        }
    };

    const _bianji = function (id) {
        nowid = id;
        let info = json[id];
        let input = ipt.getshuru('myModal_bianji', 'all');
        ipt.setinput(input).setall(info, 'json');

        $("#myModal_bianji").modal('show');
    };

    const _xiugai = function () {
        let input = ipt.getshuru('myModal_bianji', 'all');
        if (ipt.checkinput(input)) {
            let nr = ZY.MaptoJson(ipt.gettext(input));

            s.sj(nr);
            s.se('id', nowid);
            s.sb(biao);
            s.g('c/info_xiugai', {
                s: function (data) {
                    if (data.code == 200) {
                        toastr.success('修改成功');
                        _Getshuju();
                        $("#myModal_bianji").modal('hide');
                    } else {
                        toastr.error('修改失败');
                    }
                },
                e: function (e) {
                    toastr.error('网络错误');
                }
            })
        }
    };


    const _chongzhi = function (t) {
        let input = ipt.getshuru('myModal_' + t, 'all');
        ipt.clearinput(input);

    };

    const _shanchu = function (id) {
        tm('是否确认删除?', function () {
            s.se('id', id);
            s.sb(biao);
            s.g('c/common_delete_status', {
                s: function (data) {
                    if (data.code == 200) {
                        _Getshuju();
                        ts('删除成功');
                    } else {
                        te('删除失败');
                    }
                },
                e: function (e) {
                    tw('网络错误');
                }
            })
        })
    };


</script>
</html>
