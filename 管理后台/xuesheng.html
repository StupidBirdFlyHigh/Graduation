<script>
    var uptu=new UpTu();

    _Setmenu('xuesheng');

    var json = {};
    var nowid = 0;
    var biao = "xuesheng";

    const _Getshuju = function(){
        return new Promise(function(succ,err){
            s.sb(biao);
            s.se("order","id");
            s.g(`c/common_list`,{
                s:function(data){
                    if(data.code==200){
                        let info = data.data,html = [];
                        json = {};
                        html = info.map(function(obj){
                            json[obj.id]=obj;
                            return `
                           <tr>
                             <td>${obj.username}</td><td>${obj.password}</td><td>${obj.name}</td><td>${obj.xuehao}</td><td>${obj.phone}</td><td>${obj.addtime}</td><td><a href="javascript:_bianji('${obj.id}')">修改</a> | <a href="javascript:_shanchu('${obj.id}')">删除</a></td>
                           </tr>
                           `
                        });
                        document.getElementById('table').innerHTML=html.join('');
                        succ();
                    }
                },
                e:function(e){

                }
            })
        })
    };

    _Getshuju();

    const _bianji = function(id){
        nowid = id;
        let info = json[id];
        let input = ipt.getshuru('myModal_bianji','all');
        ipt.setinput(input).setall(info,'json');
        
        $("#myModal_bianji").modal('show');
    };

    const _xiugai = function(){
        let input = ipt.getshuru('myModal_bianji','all');
        if(ipt.checkinput(input)){
            let nr = ZY.MaptoJson(ipt.gettext(input));
            
            s.sj(nr);
            s.se('id',nowid);
            s.sb(biao);
            s.g('c/info_xiugai',{
                s:function(data){
                    if(data.code==200){
                        toastr.success('修改成功');
                        _Getshuju();
                        $("#myModal_bianji").modal('hide');
                    }else{
                        toastr.error('修改失败');
                    }
                },
                e:function(e){
                    toastr.error('网络错误');
                }
            })
        }
    };



    const _chongzhi = function(t){
        let input = ipt.getshuru('myModal_'+t,'all');
        ipt.clearinput(input);
        
    };

</script>
